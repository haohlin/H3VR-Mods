name: Verify H3VR Packages

on:
  pull_request:
  push:
    branches:
      - feat/h3vr-remote-pipeline

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run unit tests
        run: dotnet test tests/H3vrPipeline.Tests/H3vrPipeline.Tests.csproj
      - name: Build and package ThePing
        shell: pwsh
        run: ./tools/h3vr.ps1 -Action Package -Mod ThePing
      - name: Generate and package GunGame progressions
        shell: pwsh
        run: ./tools/h3vr.ps1 -Action Package -Mod GunGameProgressions
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: h3vr-packages
          path: build/artifacts/

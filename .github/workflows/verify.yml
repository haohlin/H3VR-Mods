name: Verify H3VR Portable Checks

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify versioned vanilla metadata and fallback profiles
        shell: pwsh
        run: |
          git ls-files --error-unmatch GunGameProgressions/ObjectData.json
          git ls-files --error-unmatch GunGameProgressions/GunGameWeaponPool_Runtime_01_Vanilla_Rot_RW_Rot.json
          git ls-files --error-unmatch GunGameProgressions/GunGameWeaponPool_Runtime_03_Vanilla_Mixed_Enemy_RW_Rot.json
          dotnet run --project GunGameProgressions/OfflineProfileGenerator/OfflineProfileGenerator.csproj -c Release -- --input GunGameProgressions/ObjectData.json --output-dir GunGameProgressions --verify
      - name: Run headless asset-inspector portable tests
        run: python tools/H3VRAssetInspector/tests/test_inspect_assets.py
      - name: Run unit tests
        run: dotnet test tests/H3vrPipeline.Tests/H3vrPipeline.Tests.csproj
